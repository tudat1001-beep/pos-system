# render.yaml - Render Blueprint
# Docs: https://render.com/docs/blueprint-spec

services:
  # Backend API
  - type: web
    name: pos-api
    env: node
    region: singapore
    plan: free
    rootDir: server
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pos-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

  # Frontend Static Site
  - type: web
    name: pos-frontend
    env: static
    region: singapore
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: pos-api
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: pos-db
    plan: free
    region: singapore
    databaseName: pos_db
